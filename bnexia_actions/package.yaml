spec-version: v2
name: bnexia-actions
version: 0.2.0
description: >
  Bnexia Graph Tools — MCP actions para diagnosis, blast_radius y construcción
  determinista de grafos operativos desde n8n workflows.

dependencies:
  conda-forge:
    - python=3.12
    - pip
  pypi:
    - sema4ai-actions>=1.0.0,<2.0.0
    - httpx>=0.27.0,<1.0.0
    - networkx>=3.1
    - fastapi>=0.105.0
    - uvicorn>=0.25.0

pythonpath:
  - .
  - ..  # Para importar graphify_n8n_standalone desde el directorio padre

packaging:
  exclude:
    - __pycache__/
    - "*.pyc"
    - .git/
    - "*.bak"
    - venv/
    - graphify-out/
    - corpus/
